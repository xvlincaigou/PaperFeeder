name: Daily Paper Digest

permissions:
  contents: read

on:
  # Run daily at 00:01 UTC (08:01 China time)
  schedule:
    - cron: '1 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back for papers'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (no email)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper digest
        env:
          # LLM 配置 (主模型 - 用于生成报告)
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # LLM Filter 配置 (筛选模型 - 可以用更便宜的)
          LLM_FILTER_API_KEY: ${{ secrets.LLM_FILTER_API_KEY }}
          LLM_FILTER_BASE_URL: ${{ secrets.LLM_FILTER_BASE_URL }}
          LLM_FILTER_MODEL: ${{ secrets.LLM_FILTER_MODEL }}
          # Research enrichment
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # 兼容旧配置
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Semantic Scholar memory (optional overrides)
          SEMANTIC_MEMORY_ENABLED: ${{ github.event.inputs.dry_run == 'true' && 'false' || vars.SEMANTIC_MEMORY_ENABLED }}
          SEMANTIC_SEEN_TTL_DAYS: ${{ vars.SEMANTIC_SEEN_TTL_DAYS }}
          SEMANTIC_MEMORY_MAX_IDS: ${{ vars.SEMANTIC_MEMORY_MAX_IDS }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          # Email
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # SMTP Configuration (for 126邮箱, Gmail, etc.)
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          # Optional: Cloudflare D1
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          SEMANTIC_STATE_BACKEND: d1
          # One-click feedback (V3)
          FEEDBACK_ENDPOINT_BASE_URL: ${{ secrets.FEEDBACK_ENDPOINT_BASE_URL }}
          FEEDBACK_LINK_SIGNING_SECRET: ${{ secrets.FEEDBACK_LINK_SIGNING_SECRET }}
          FEEDBACK_TOKEN_TTL_DAYS: ${{ vars.FEEDBACK_TOKEN_TTL_DAYS }}
          FEEDBACK_REVIEWER: ${{ vars.FEEDBACK_REVIEWER }}
        run: |
          DAYS="${{ github.event.inputs.days_back || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          if [ "$DRY_RUN" = "true" ]; then
            python main.py --days $DAYS --dry-run
          else
            python main.py --days $DAYS
          fi

      - name: Upload report artifact (on dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: paper-report
          path: report_preview.html
          retention-days: 7

      - name: Package feedback artifacts
        if: always()
        run: |
          echo "ZIP_NAME=" >> "$GITHUB_ENV"
          shopt -s nullglob
          FILES=(artifacts/run_feedback_manifest_*.json artifacts/semantic_feedback_template_*.json)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No feedback files found to package."
            exit 0
          fi
          ZIP_NAME="feedback-artifacts-${GITHUB_RUN_ID}.zip"
          zip -j "$ZIP_NAME" "${FILES[@]}"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload feedback artifacts
        if: ${{ always() && env.ZIP_NAME != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: feedback-artifacts-${{ github.run_id }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: warn
          retention-days: 14

