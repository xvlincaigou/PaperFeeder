# PaperFeeder main configuration
#
# Edit this file for toggles, fetch windows, and paths.
# Edit user/blogs.yaml for blog sources.
# Edit other files under user/ for research interests, keywords, and prompt text.

# User text/profile files
user_blog_settings_path: "user/blogs.yaml"
user_research_profile_path: "user/research_interests.txt"
user_prompt_addon_path: "user/prompt_addon.txt"
user_arxiv_categories_path: "user/arxiv_categories.txt"
user_keywords_path: "user/keywords.txt"
user_exclude_keywords_path: "user/exclude_keywords.txt"

# Filtering and report sizing
llm_filter_enabled: true
llm_filter_threshold: 6
max_papers: 10

# Prompt / report language
# Supported: zh-CN, en-US
prompt_language: "zh-CN"

# PDF handling
extract_fulltext: true
fulltext_top_n: 3
pdf_max_pages: 15

# Source toggles
papers_enabled: true
manual_source_enabled: false
manual_source_path: "manual_papers.json"
semantic_scholar_enabled: true
semantic_scholar_max_results: 20
blogs_enabled: true
blog_days_back: 7
max_blog_posts: 3

# State paths
semantic_scholar_seeds_path: "state/semantic/seeds.json"
semantic_memory_enabled: true
semantic_memory_path: "state/semantic/memory.json"
semantic_seen_ttl_days: 30
semantic_memory_max_ids: 5000

# Feedback output
feedback_email_attachments: none